<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KON.X.ION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,200&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --emerald: rgba(4,99,7,1);
    --emerald-line: rgba(4,99,7,0.28);
    --sheet-bg: rgba(255,255,255,0.72);
    --sheet-blur: blur(40px) saturate(1.8);
    --radius-sheet: 28px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: #ffffff;
  }
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(255,255,255,0.04) 0%,
      rgba(0,0,0,0.08) 60%,
      rgba(0,0,0,0.22) 100%);
  }

  /* ── CANVAS (particles) ── */
  #heartCanvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* ── HERO ── */
  #hero {
    position: fixed; inset: 0; z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #hero.hidden {
    opacity: 0; pointer-events: none; transform: translateY(-10px);
  }

  /* wordmark */
  #wordmark {
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  @keyframes vibrate {
    0%   { transform: translate(0, 0) scale(1); }
    20%  { transform: translate(1.2px, -0.8px) scale(1.002); }
    40%  { transform: translate(-1px, 1px) scale(0.998); }
    60%  { transform: translate(1px, 0.8px) scale(1.002); }
    80%  { transform: translate(-0.8px, -1px) scale(0.999); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes wordGather {
    0%   { opacity: 0; transform: scaleX(2.2); }
    30%  { opacity: 1; }
    100% { opacity: 1; transform: scaleX(1); }
  }

  /* hero tagline */
  #heroTagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 200;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.45);
    text-align: center;
    margin: -8px 0 0;
    pointer-events: none;
    user-select: none;
  }

  /* begin journey button */
  #beginBtn {
    position: relative;
    padding: 14px 38px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.06em;
    color: rgba(0,0,0,0.82);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px) saturate(1.6);
    -webkit-backdrop-filter: blur(20px) saturate(1.6);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 0 0 0.5px rgba(255,255,255,0.5),
      0 4px 24px rgba(0,0,0,0.08);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #beginBtn:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.5);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 0 0 0.5px rgba(255,255,255,0.6),
      0 2px 10px rgba(0,0,0,0.06);
  }

  /* location tag */
  #location {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%);
    z-index: 2;
    font-family: 'DM Sans', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.78);
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #location.hidden { opacity: 0; }

  /* ── BOTTOM SHEET ── */
  #sheet {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    z-index: 30;
    border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
    background: var(--sheet-bg);
    backdrop-filter: var(--sheet-blur);
    -webkit-backdrop-filter: var(--sheet-blur);
    box-shadow:
      0 -1px 0 rgba(255,255,255,0.8),
      0 -8px 40px rgba(0,0,0,0.12);
    padding: 0 0 calc(24px + var(--safe-bottom)) 0;
    transform: translateY(110%);
    transition: transform 0.48s cubic-bezier(0.32,0.72,0,1);
    max-height: 90dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #sheet.open {
    transform: translateY(0);
  }

  /* drag handle */
  .sheet-handle {
    width: 36px; height: 5px;
    border-radius: 3px;
    background: rgba(0,0,0,0.18);
    margin: 14px auto 20px;
  }

  /* sheet header */
  .sheet-header {
    padding: 0 24px 18px;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }
  .sheet-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: rgba(0,0,0,0.85);
    letter-spacing: 0.01em;
  }
  .sheet-sub {
    font-size: 12px;
    font-weight: 300;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* rows */
  .sheet-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    text-decoration: none;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease;
  }
  .sheet-row:active { background: rgba(0,0,0,0.04); }
  .row-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 17px;
  }
  .row-icon.email-icon { background: rgba(0,122,255,0.1); }
  .row-icon.ig-icon    { background: linear-gradient(135deg, rgba(255,160,0,0.15), rgba(200,0,100,0.12)); }
  .row-icon.tt-icon    { background: rgba(0,0,0,0.06); }
  .row-label {
    flex: 1;
    font-size: 15px;
    font-weight: 300;
    color: rgba(0,0,0,0.78);
  }
  .row-label span {
    display: block;
    font-size: 12px;
    font-weight: 200;
    color: rgba(0,0,0,0.35);
    letter-spacing: 0.06em;
    margin-top: 1px;
  }
  .row-chevron {
    color: rgba(0,0,0,0.22);
    font-size: 14px;
  }

  /* contact form */
  .form-section {
    padding: 20px 24px 8px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.38);
    margin-bottom: 12px;
    display: block;
  }
  .form-field {
    width: 100%;
    background: rgba(0,0,0,0.04);
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(0,0,0,0.82);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.18s ease, background 0.18s ease;
    -webkit-appearance: none;
    resize: none;
  }
  .form-field::placeholder { color: rgba(0,0,0,0.28); }
  .form-field:focus {
    border-color: rgba(4,99,7,0.5);
    background: rgba(255,255,255,0.6);
  }
  textarea.form-field { height: 90px; }

  .send-btn {
    width: 100%;
    margin-top: 4px;
    padding: 15px;
    border-radius: 999px;
    border: none;
    background: rgba(4,99,7,0.92);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.16s ease, opacity 0.16s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:active { transform: scale(0.97); opacity: 0.88; }

  .send-confirm {
    text-align: center;
    font-size: 13px;
    font-weight: 300;
    color: rgba(4,99,7,0.8);
    margin-top: 10px;
    min-height: 18px;
    letter-spacing: 0.04em;
  }

  /* overlay dim */
  #overlay {
    position: fixed; inset: 0; z-index: 29;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.4s ease;
  }
  #overlay.active {
    background: rgba(0,0,0,0.28);
    pointer-events: all;
  }

  /* SVG icons inline */
  .svg-icon { width: 18px; height: 18px; }
</style>
</head>

    <div style="margin-top:56px;display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div style="width:40px;height:0.5px;background:rgba(4,210,10,0.4);"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="font-size:18px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:300;font-family:'DM Sans',sans-serif;">Saturday, July 18</div>
        <div style="font-size:18px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:300;font-family:'DM Sans',sans-serif;">11AM — 6AM</div>
        <div style="font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(4,210,10,0.65);font-weight:200;font-family:'DM Sans',sans-serif;">Guatapé, Colombia</div>
      </div>
      <div style="width:40px;height:0.5px;background:rgba(4,210,10,0.4);"></div>
    </div>
  </div>
  <button id="journeyBack" onclick="closeJourney()" style="position:absolute;top:28px;left:24px;z-index:10;background:none;border:0.5px solid rgba(4,200,10,0.3);border-radius:999px;padding:12px 24px;min-height:44px;color:rgba(4,200,10,0.8);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;font-weight:300;cursor:pointer;transition:all 0.2s ease, opacity 0.5s ease;opacity:0;">← Back</button>
  <button id="touchBtn" onclick="openSheet()" style="position:absolute;bottom:56px;left:50%;transform:translateX(-50%);z-index:10;background:none;border:0.5px solid rgba(4,200,10,0.35);border-radius:999px;padding:14px 36px;min-height:44px;color:rgba(4,200,10,0.85);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;font-weight:300;cursor:pointer;white-space:nowrap;transition:opacity 0.5s ease;opacity:0;">Get in Touch</button>
  <div style="position:absolute;bottom:0;left:0;right:0;z-index:5;height:36px;border-top:0.5px solid rgba(4,200,10,0.2);overflow:hidden;background:rgba(0,0,0,0.5);">
    <div class="j-ticker">
      <span class="j-tick">Minimal</span><span class="j-dot">·</span><span class="j-tick">Afro House</span><span class="j-dot">·</span><span class="j-tick">Tech House</span><span class="j-dot">·</span><span class="j-tick">House</span><span class="j-dot">·</span><span class="j-tick">Minimal</span><span class="j-dot">·</span><span class="j-tick">Afro House</span><span class="j-dot">·</span><span class="j-tick">Tech House</span><span class="j-dot">·</span><span class="j-tick">House</span><span class="j-dot">·</span>
    </div>
  </div>
</div>

<script>
// ── JOURNEY OPEN / CLOSE ──
let tunnelRAF = null;

function openJourney() {
  const journey   = document.getElementById('journey');
  const content   = document.getElementById('journeyContent');
  const back      = document.getElementById('journeyBack');
  const blackFade = document.getElementById('blackFade');
  const bg        = document.getElementById('bg');
  const heroEl    = document.getElementById('hero');

  // Step 1: Explode the heart immediately
  heartExploding = true;

  // Fade logo + button out
  heroEl.style.transition = 'opacity 0.8s ease';
  heroEl.style.opacity = '0';

  // Fade white background to black over 1.5s
  blackFade.style.transition = 'opacity 1.5s ease';
  blackFade.style.opacity = '1';
  blackFade.style.pointerEvents = 'all';

  // Step 2: Start tunnel at 1s (behind the black)
  startTunnel();
  setTimeout(() => {
    journey.style.opacity = '1';
    journey.style.pointerEvents = 'all';
  }, 1000);

  // Step 3: At peak black (1.5s), fade black overlay away revealing tunnel
  setTimeout(() => {
    blackFade.style.transition = 'opacity 1.2s ease';
    blackFade.style.opacity = '0';
    blackFade.style.pointerEvents = 'none';
  }, 1500);

  // Step 4: Show event content + back button
  setTimeout(() => {
    content.style.opacity = '1';
    back.style.opacity    = '1';
    const touchBtn = document.getElementById('touchBtn');
    if (touchBtn) touchBtn.style.opacity = '1';
  }, 2200);
}

function closeJourney() {
  const journey   = document.getElementById('journey');
  const content   = document.getElementById('journeyContent');
  const back      = document.getElementById('journeyBack');
  const blackFade = document.getElementById('blackFade');
  const heroEl    = document.getElementById('hero');
  const heartCanvas = document.getElementById('heartCanvas');

  content.style.opacity = '0';
  back.style.opacity    = '0';
  const touchBtn = document.getElementById('touchBtn');
  if (touchBtn) touchBtn.style.opacity = '0';

  // Fade to black
  blackFade.style.transition = 'opacity 0.8s ease';
  blackFade.style.opacity = '1';
  blackFade.style.pointerEvents = 'all';

  setTimeout(() => {
    journey.style.opacity = '0';
    journey.style.pointerEvents = 'none';
    // Reset heart
    heartExploding = false;
    heartExplodeT  = 0;
    heartCanvas.style.opacity = '1';
    heroEl.style.opacity = '1';
    if (tunnelRAF) { cancelAnimationFrame(tunnelRAF); tunnelRAF = null; }
  }, 800);

  setTimeout(() => {
    blackFade.style.transition = 'opacity 1s ease';
    blackFade.style.opacity = '0';
    blackFade.style.pointerEvents = 'none';
  }, 1000);
}


function startTunnel() {
  const canvas = document.getElementById('tunnelCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, cx, cy;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2; cy = H / 2;
  }
  resize();

  const RINGS      = 28;
  const RING_SIDES = 8;
  const SPEED      = 1.4;
  const FOV        = 280;
  const E          = { r:4, g:180, b:10 };
  let offset       = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    offset = (offset + SPEED) % (1000 / RINGS);

    for (let r = RINGS - 1; r >= 0; r--) {
      const depth = r * (1000 / RINGS) + offset;
      if (depth <= 0) continue;

      const perspective = FOV / depth;
      const radius      = 320 * perspective;
      const alpha       = Math.min(1, depth / 200) * 0.55;
      const bright      = Math.min(1, 1.2 - depth / 900);

      // Octagonal ring
      ctx.beginPath();
      for (let s = 0; s <= RING_SIDES; s++) {
        const angle = (s / RING_SIDES) * Math.PI * 2 - Math.PI / RING_SIDES;
        const px = cx + Math.cos(angle) * radius;
        const py = cy + Math.sin(angle) * radius;
        s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = `rgba(${E.r},${E.g},${E.b},${alpha})`;
      ctx.lineWidth   = Math.max(0.3, perspective * 1.8);
      ctx.shadowColor = `rgba(${E.r},${E.g},${E.b},${bright * 0.6})`;
      ctx.shadowBlur  = 8 * bright;
      ctx.stroke();

      // Spoke lines every other ring
      if (r < RINGS - 1 && r % 2 === 0) {
        const nDepth = (r + 1) * (1000 / RINGS) + offset;
        if (nDepth > 0) {
          const nPersp  = FOV / nDepth;
          const nRadius = 320 * nPersp;
          for (let s = 0; s < RING_SIDES; s++) {
            const angle = (s / RING_SIDES) * Math.PI * 2 - Math.PI / RING_SIDES;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * radius,  cy + Math.sin(angle) * radius);
            ctx.lineTo(cx + Math.cos(angle) * nRadius, cy + Math.sin(angle) * nRadius);
            ctx.strokeStyle = `rgba(${E.r},${E.g},${E.b},${alpha * 0.45})`;
            ctx.lineWidth   = Math.max(0.3, perspective * 1.8) * 0.5;
            ctx.shadowBlur  = 4;
            ctx.stroke();
          }
        }
      }
    }

    // Center glow
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H)*0.35);
    grd.addColorStop(0, 'rgba(4,180,10,0.07)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.shadowBlur = 0;
    ctx.fillRect(0, 0, W, H);

    tunnelRAF = requestAnimationFrame(draw);
  }
  draw();
}


function igFallback(e) {
  setTimeout(() => {
    if (!document.hidden) window.open('https://www.instagram.com/kon.x.ion', '_blank');
  }, 1500);
}

// ── SHEET LOGIC ──
const sheet    = document.getElementById('sheet');
const overlay  = document.getElementById('overlay');
const hero     = document.getElementById('hero');
const locTag   = document.getElementById('location');
const beginBtn = document.getElementById('beginBtn');

function openSheet()  { sheet.classList.add('open'); overlay.classList.add('active'); hero.classList.add('hidden'); if(locTag) locTag.classList.add('hidden'); }
function closeSheet() { sheet.classList.remove('open'); overlay.classList.remove('active'); hero.classList.remove('hidden'); if(locTag) locTag.classList.remove('hidden'); }

beginBtn.addEventListener('click', openJourney);
overlay.addEventListener('click', closeSheet);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

let touchStartY = 0;
sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - touchStartY > 60 && sheet.scrollTop === 0) closeSheet(); }, { passive: true });

// ── FORM ──
// Replace FORMSPREE_ID below with your form ID from https://formspree.io
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/FORMSPREE_ID';

async function handleSend() {
  const name  = document.getElementById('fname').value.trim();
  const email = document.getElementById('femail').value.trim();
  const msg   = document.getElementById('fmsg').value.trim();
  const conf  = document.getElementById('sendConfirm');
  const btn   = document.querySelector('.send-btn');
  if (!name || !email || !msg) { conf.style.color='rgba(200,50,30,0.7)'; conf.textContent='Please fill in all fields.'; return; }
  btn.disabled = true;
  btn.textContent = 'Sending…';
  conf.textContent = '';
  try {
    const res = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, email, message: msg })
    });
    if (res.ok) {
      conf.style.color='rgba(4,99,7,0.8)'; conf.textContent='Message sent ✓';
      document.getElementById('fname').value=''; document.getElementById('femail').value=''; document.getElementById('fmsg').value='';
    } else {
      throw new Error('Server error');
    }
  } catch(e) {
    conf.style.color='rgba(200,50,30,0.7)'; conf.textContent='Could not send — email konxion@icloud.com directly.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

// ── 3D HEART PARTICLE SYSTEM ──
// Globals so openJourney can trigger explosion
let heartExploding = false;
let heartExplodeT  = 0;
let heartExplodeVels = [];

(function() {
  const canvas  = document.getElementById('heartCanvas');
  const ctx     = canvas.getContext('2d');
  const EMERALD = { r: 4, g: 99, b: 7 };
  let W, H, cx, cy, heartScale;

  const HEART_SVG_PATH =
    "M 96,36 C 88,22 74,12 62,10 C 70,8 82,8 92,14 C 98,10 108,8 116,12 " +
    "C 124,16 134,24 140,36 C 150,50 156,68 154,86 C 152,102 144,116 134,126 " +
    "C 124,136 114,144 106,152 C 100,158 96,164 92,168 C 88,172 82,174 78,172 " +
    "C 72,170 66,164 62,156 C 54,144 48,130 46,114 C 44,98 46,80 52,66 " +
    "C 58,52 70,40 82,36 C 88,34 92,34 96,36 Z";

  function sampleHeartPath(n) {
    const svg  = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 200 200');
    svg.style.cssText='position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:-9999px;left:-9999px';
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', HEART_SVG_PATH);
    svg.appendChild(path); document.body.appendChild(svg);
    const len = path.getTotalLength();
    const pts = [];
    for (let i=0;i<n;i++) { const pt=path.getPointAtLength((i/n)*len); pts.push({x:(pt.x-100)/58,y:(pt.y-105)/58}); }
    document.body.removeChild(svg);
    return pts;
  }

  const OUTLINE_N = 36, DEPTH = 0.45;
  let pts3D = [], edges = [];

  function buildGeometry() {
    const outline = sampleHeartPath(OUTLINE_N);
    pts3D = []; edges = [];
    for (let r=0;r<2;r++) {
      const z = r===0 ? DEPTH : -DEPTH;
      for (let i=0;i<OUTLINE_N;i++) pts3D.push({ox:outline[i].x, oy:outline[i].y, oz:z});
    }
    const fO=0, bO=OUTLINE_N;
    for (let i=0;i<OUTLINE_N;i++) { edges.push([fO+i, fO+(i+1)%OUTLINE_N]); edges.push([bO+i, bO+(i+1)%OUTLINE_N]); }
    for (let i=0;i<OUTLINE_N;i+=4) edges.push([fO+i, bO+i]);
    for (let i=0;i<OUTLINE_N;i+=6) { const j=(i+Math.floor(OUTLINE_N/2))%OUTLINE_N; edges.push([fO+i, bO+j]); }
    for (let i=0;i<8;i++) {
      const a=Math.floor((i/8)*OUTLINE_N), b=Math.floor(((i+1)/8)*OUTLINE_N);
      edges.push([fO+a, bO+(a+2)%OUTLINE_N]);
      edges.push([fO+b, bO+(b-2+OUTLINE_N)%OUTLINE_N]);
    }
    // Assign random explosion velocities
    heartExplodeVels = pts3D.map(() => {
      const angle = Math.random()*Math.PI*2;
      const speed = 3 + Math.random()*6;
      return { vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed };
    });
  }

  let rotY=0, rotX=0.18;
  const FOV=2.8;

  function project(pt, scale) {
    const cosY=Math.cos(rotY), sinY=Math.sin(rotY), cosX=Math.cos(rotX), sinX=Math.sin(rotX);
    let x=pt.ox, y=pt.oy, z=pt.oz;
    const x1=x*cosY-z*sinY, z1=x*sinY+z*cosY;
    const y2=y*cosX-z1*sinX, z2=y*sinX+z1*cosX;
    const p=FOV/(FOV+z2);
    return {sx:cx+x1*scale*p, sy:cy+y2*scale*p, z:z2, p};
  }

  function resize() {
    W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
    cx=W/2; cy=H/2; heartScale=Math.min(W,H)*0.26;
  }

  let lineAlphaGlobal=0, lineFrame=0;
  const LINE_DELAY=180, LINE_FADE=120, PULSE_PERIOD=90;

  function advanceLines() {
    lineFrame++;
    const t=lineFrame%PULSE_PERIOD/PULSE_PERIOD;
    lineAlphaGlobal=0.6+0.4*(0.5-0.5*Math.cos(t*Math.PI*2));
  }

  let explodeOffsets = null;

  function tick() {
    ctx.clearRect(0,0,W,H);
    rotY = 0.55*Math.sin(Date.now()*0.0005);
    advanceLines();
    const scale = heartScale*1.15;
    const projected = pts3D.map(pt=>project(pt,scale));

    // EXPLOSION
    if (heartExploding) {
      heartExplodeT = Math.min(heartExplodeT + 0.018, 1);
      if (!explodeOffsets) explodeOffsets = pts3D.map(()=>({x:0,y:0}));
      const ease = heartExplodeT < 0.5
        ? 4*heartExplodeT*heartExplodeT*heartExplodeT
        : 1-Math.pow(-2*heartExplodeT+2,3)/2;
      for (let k=0;k<pts3D.length;k++) {
        explodeOffsets[k].x = heartExplodeVels[k].vx * ease * heartScale * 2.2;
        explodeOffsets[k].y = heartExplodeVels[k].vy * ease * heartScale * 2.2;
      }
      for (let k=0;k<projected.length;k++) {
        projected[k].sx += explodeOffsets[k].x;
        projected[k].sy += explodeOffsets[k].y;
      }
      canvas.style.opacity = String(Math.max(0, 1 - heartExplodeT * 1.3));
    } else {
      explodeOffsets = null;
      heartExplodeT  = 0;
    }

    // Draw lines
    const lA = heartExploding
      ? lineAlphaGlobal * Math.max(0, 1 - heartExplodeT * 0.7)
      : lineAlphaGlobal;
    if (lA > 0.01) {
      const sorted = edges.map(([i,j])=>({i,j,avgZ:(projected[i].z+projected[j].z)/2})).sort((a,b)=>a.avgZ-b.avgZ);
      for (const {i,j,avgZ} of sorted) {
        const pi=projected[i], pj=projected[j];
        const df=Math.max(0,Math.min(1,(avgZ+DEPTH+0.3)/(DEPTH*2+0.6)));
        ctx.beginPath();
        ctx.strokeStyle=`rgba(${EMERALD.r},${EMERALD.g},${EMERALD.b},${(0.18+df*0.28)*lA})`;
        ctx.lineWidth=0.6+df*0.8;
        ctx.moveTo(pi.sx,pi.sy); ctx.lineTo(pj.sx,pj.sy); ctx.stroke();
      }
    }

    // Draw dots
    for (let k=0;k<projected.length;k++) {
      const pt=projected[k];
      const df=Math.max(0,Math.min(1,(pt.z+DEPTH+0.3)/(DEPTH*2+0.6)));
      ctx.beginPath();
      ctx.arc(pt.sx,pt.sy,1.2+df*1.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(${EMERALD.r},${EMERALD.g},${EMERALD.b},${0.25+df*0.25})`;
      ctx.fill();
    }

    requestAnimationFrame(tick);
  }

  window.addEventListener('resize', resize);
  resize();
  buildGeometry();
  tick();
})();
</script>
